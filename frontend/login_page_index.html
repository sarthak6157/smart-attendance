<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        body { background-color: #f4f7f6; }
        .login-card { max-width: 400px; width: 100%; border-radius: 10px; margin: auto; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4 login-card">
        <div class="text-center mb-4">
            <h2 class="text-primary fw-bold"><i class="fas fa-qrcode"></i> SmartAttnd</h2>
            <p class="text-muted">Please login to your account</p>
        </div>

        <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="userId" class="form-label fw-semibold">User ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control" id="userId" placeholder="Enter your User ID" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" data-bs-toggle="tooltip" title="Show/Hide Password">
                        <i class="fas fa-eye" id="togglePasswordIcon"></i>
                    </button>
                </div>
                <small id="capsWarning" class="text-danger d-none fw-bold mt-1 d-block">
                    <i class="fas fa-exclamation-triangle"></i> Caps Lock is ON
                </small>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="loginBtn" disabled>
                <span class="spinner-border spinner-border-sm d-none btn-spinner" role="status" aria-hidden="true"></span>
                <span class="btn-text">Login</span>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Initialize Bootstrap tooltips
        document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = loginBtn.querySelector('.btn-text');
        const btnSpinner = loginBtn.querySelector('.btn-spinner');
        const alertBox = document.getElementById('authAlert');
        const userIdEl = document.getElementById('userId');
        const passwordEl = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const togglePasswordIcon = document.getElementById('togglePasswordIcon');
        const rememberMeEl = document.getElementById('rememberMe');
        const capsWarning = document.getElementById('capsWarning');

        // Prefill User ID if remembered
        document.addEventListener('DOMContentLoaded', () => {
            const remembered = localStorage.getItem('rememberedUserId');
            if (remembered) {
                userIdEl.value = remembered;
                rememberMeEl.checked = true;
            }
            updateButtonState();
        });

        function updateButtonState() {
            const uidTrimmed = userIdEl.value.trim();
            const pwd = passwordEl.value;
            loginBtn.disabled = !(uidTrimmed.length > 0 && pwd.length > 0);
        }

        userIdEl.addEventListener('input', updateButtonState);
        passwordEl.addEventListener('input', updateButtonState);

        togglePasswordBtn.addEventListener('click', () => {
            const isPwd = passwordEl.type === 'password';
            passwordEl.type = isPwd ? 'text' : 'password';
            togglePasswordIcon.classList.toggle('fa-eye');
            togglePasswordIcon.classList.toggle('fa-eye-slash');
        });

        passwordEl.addEventListener('keyup', (e) => {
            const caps = e.getModifierState && e.getModifierState('CapsLock');
            capsWarning.classList.toggle('d-none', !caps);
        });

        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.setAttribute('disabled', 'disabled');
                btnSpinner.classList.remove('d-none');
                btnText.textContent = 'Signing in...';
            } else {
                btnSpinner.classList.add('d-none');
                btnText.textContent = 'Login';
                updateButtonState();
            }
        }

        function showError(message) {
            alertBox.textContent = message;
            alertBox.classList.remove('d-none');
            Swal.fire({
                icon: 'error',
                title: 'Sign-in failed',
                text: message,
                confirmButtonColor: '#00FFFF'
            });
        }

        function clearError() {
            alertBox.classList.add('d-none');
            alertBox.textContent = '';
        }

        // --- LOGIN SUBMISSION HANDLER ---
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            clearError();

            const uid = userIdEl.value.trim();
            const pwd = passwordEl.value;

            if (!uid || !pwd) {
                showError('Please provide both User ID and Password.');
                return;
            }

            setLoading(true);

            if (rememberMeEl.checked) {
                localStorage.setItem('rememberedUserId', uid);
            } else {
                localStorage.removeItem('rememberedUserId');
            }

            const backendUrl = '/api/auth/login';

            fetch(backendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: uid, 
                    password: pwd
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Invalid credentials');
                return response.json();
            })
            .then(data => {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user_role', data.role);
                localStorage.setItem('user_name', data.full_name);
                
                Swal.fire({
                    icon: 'success',
                    title: 'Welcome',
                    text: 'Authentication successful!',
                    showConfirmButton: false,
                    timer: 1200
                });

                setTimeout(() => {
                    window.location.href = data.redirect || './login_page.html';
                }, 900);
            })
            .catch(error => {
                setLoading(false);
                showError('Login failed. Please check your User ID and Password.');
            });
        });
    </script>
</body>
</html>
